defaults:
  - model: eegnet
  - _self_

hydra:
  run:
    dir: ${output_dir}/${model.name}/${metric}/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: false

dataset_dir: data/
granularity: fine
batch_size: 40
output_dir: outputs/
pretrained_model: null
metric: wt   # evaluation paradigm: wt (Within-Time), ct (Cross-Time), cp (Cross-Participant)
feature_type : time # time or freq

# For general model settings, see configs/model/*.yaml
diffusion:
  sd_model: CompVis/stable-diffusion-v1-4
  image_size: 512
  num_inference_steps: 50
  guidance_scale: 7.5
  seed: 42

blip:
  model: Salesforce/blip-image-captioning-base
  generation:
    max_length: 200
    num_beams: 20
    temperature: 0.5
    top_k: 0
    top_p: 0.9
    repetition_penalty: 2.0
    do_sample: true
