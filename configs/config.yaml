defaults:
  - model: eegnet
  - _self_

dataset_dir: data/
granularity: coarse
subject: 0
batch_size: 40
output_dir: outputs/
pretrained_model: null
metric: wt   # evaluation paradigm: wt (Within-Time), ct (Cross-Time), cp (Cross-Participant)

# Synthetic CrossPT-EEG dataset (JEPA only; skips EEG-ImageNet loading when true)
synthetic: false
fine_group: 0
num_subjects: 16
samples_per_subject: 480
num_workers: 0
seed: 42

hydra:
  run:
    dir: ${output_dir}/${model.name}/${metric}/s${subject}/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: false

diffusion:
  sd_model: CompVis/stable-diffusion-v1-4
  image_size: 512
  num_inference_steps: 50
  guidance_scale: 7.5
  seed: 42

blip:
  model: Salesforce/blip-image-captioning-base
  generation:
    max_length: 200
    num_beams: 20
    temperature: 0.5
    top_k: 0
    top_p: 0.9
    repetition_penalty: 2.0
    do_sample: true
