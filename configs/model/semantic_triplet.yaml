name: semantic_triplet
type: deep
use_freq: false
epochs: 300

n_channels: 62
seq_len: 400
patch_len: 20
embed_dim: 256
num_heads: 8
depth: 4
dropout: 0.1
projection_dim: 128

triplet_margin: 0.2
triplet_weight: 0.5
jepa_weight: 0.5
ce_weight: 1.0
ema_decay: 0.996

optimizer:
  type: adam
  lr: 0.001
  weight_decay: 0.0001
