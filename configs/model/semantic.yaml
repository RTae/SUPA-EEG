name: semantic
type: deep
use_freq: false
epochs: 300

backbone: transformer
n_channels: 62
seq_len: 400
patch_len: 20
embed_dim: 256
nn_hidden_dim: 256
num_heads: 8
depth: 4
dropout: 0.1
projection_dim: 128

semantic_knn_path: null
semantic_knn_k: 4
semantic_neg_k: 4
auto_build_semantic_knn: true
semantic_knn_overwrite: false

triplet_margin: 0.2
ema_decay: 0.996

optimizer:
  type: adam
  lr: 0.001
  weight_decay: 0.0001
