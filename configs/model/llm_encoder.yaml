name: llm_encoder
type: deep
use_freq: false
epochs: 50

# Pre-trained Qwen backbone (HuggingFace model ID)
pretrained_name: Qwen/Qwen2.5-0.5B

# EEG front-end (before projecting into Qwen's hidden dim)
n_channels: 62
seq_len: 400
patch_len: 40
patch_embed_dim: 128   # intermediate patch embedding dim before input_proj

# Downstream head
linear_probe: true     # freeze backbone, train head only (recommended for large LLM)
fine_tune_llm: false   # only applies when linear_probe=false:
                       #   false → frozen LLM, train frontend (patch_embed/proj/agg) + head
                       #   true  → full end-to-end (fine-tune entire LLM backbone)
downstream:
  type: linear         # or mlp with hidden_dims

# Optimizer (for head in linear-probe mode; also backbone in end-to-end mode)
optimizer:
  type: adamw
  lr: 0.0001
  weight_decay: 0.01
