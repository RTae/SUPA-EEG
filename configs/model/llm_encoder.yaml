name: llm_encoder
type: deep
use_freq: false
epochs: 50

# Pre-trained Qwen backbone (HuggingFace model ID)
pretrained_name: Qwen/Qwen2.5-0.5B

# EEG front-end (before projecting into Qwen's hidden dim)
n_channels: 62
seq_len: 400
patch_len: 40
patch_embed_dim: 128   # intermediate patch embedding dim before input_proj

# Downstream head
linear_probe: true     # freeze backbone, train head only (recommended for large LLM)
fine_tune_llm: false   # only applies when linear_probe=false:
                       #   false → frozen LLM, train frontend (patch_embed/proj/agg) + head
                       #   true  → full end-to-end (fine-tune entire LLM backbone)

# LoRA — parameter-efficient fine-tuning of the LLM backbone
# Requires: uv add peft  (or pip install peft)
# When lora=true, set linear_probe=false to activate backbone training.
# Only the low-rank matrices (~0.5-1% of params) + frontend will train.
lora: false
lora_r: 8                              # rank of LoRA matrices
lora_alpha: 16                         # scaling factor (effective lr = lora_alpha / lora_r)
lora_dropout: 0.05
lora_target_modules: [q_proj, v_proj]  # attention projections to inject LoRA into

downstream:
  type: linear         # or mlp with hidden_dims

# Optimizer (for head in linear-probe mode; also backbone in end-to-end mode)
optimizer:
  type: adamw
  lr: 0.0001
  weight_decay: 0.01
