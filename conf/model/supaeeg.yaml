name: supaeeg
type: deep

# ---- Data ----------------------------------------------------------------
dataset_dir: data/things_eeg
feature_path: data/vision_encoder/clip/visual_features_clip.pt
device: ${oc.env:DEVICE,cuda}   # override: DEVICE=cpu python src/train.py

# ---- Visual encoder ------------------------------------------------------
encoder:
  type: clip                              # "clip" or "ijepa"
  model_name: openai/clip-vit-base-patch32
  layer_indices:
    S1: 3    # early  – local edges & colours
    S2: 7    # mid    – spatial structure
    S3: 11   # late   – high-level semantics

# ---- Training ------------------------------------------------------------
epochs: 100
batch_size: 256
eval_every: 5

# ---- Loss weights --------------------------------------------------------
lambda_reg: 0.1    # Gaussian regulariser weight
beta_l1: 0.01      # channel-attention L1 sparsity weight
tau: 0.07          # InfoNCE temperature

# ---- Architecture --------------------------------------------------------
d_model: 256
nhead: 8
num_layers: 4
dim_feedforward: 512
dropout: 0.1

# ---- Optimiser -----------------------------------------------------------
optimizer:
  type: adamw
  lr: 3e-4
  weight_decay: 1e-4
