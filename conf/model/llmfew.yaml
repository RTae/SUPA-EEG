name: llmfew
type: deep
feature_type: time

# Training budget (paper Appendix C: 200 epochs, Adam, lr=2e-4).
epochs: 200
optimizer:
  type: adam
  lr: 0.0002

# Raw EEG shape coming out of EEGImageNetDataset (62 channels, 400 timesteps).
num_channels: 62
sequence_length: 400

# Patching (paper Appendix C defaults).
patch_length: 32
stride: 16

# PTCEnc (paper Appendix C defaults).
channel_size: 256
depth: 3
kernel_size: 3
encoder_dropout: 0.1

# LLM backbone. Any HuggingFace causal-LM id works; defaults to GPT-2 small (117M).
# Try gpt2-medium, gpt2-large, Qwen/Qwen1.5-0.5B, meta-llama/Llama-3.2-1B, etc.
llm_name: gpt2

# LoRA fine-tuning on attention Q/K/V (paper Appendix C: r=8, alpha=32, dropout=0.1).
lora_r: 8
lora_alpha: 32
lora_dropout: 0.1
# Leave null to auto-pick by LLM family (c_attn for gpt2, q/k/v_proj for qwen/llama).
lora_target_modules: null
