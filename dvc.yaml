stages:
  train_mlp:
    desc: Orchestrate the MLP experiment through Hydra
    cmd: uv run python src/object_classification.py
    deps:
      - src/
      - configs/
      - data/EEG-ImageNet.pth
    params:
      - configs/config.yaml:
          - model
          - batch_size
          - granularity
          - subject
          - metric
          - output_dir
      - configs/model/mlp.yaml:
          - feature_type
          - epochs
          - optimizer.type
          - optimizer.lr
          - optimizer.weight_decay
          - optimizer.momentum
    outs:
      - outputs/:
          cache: false
          persist: true
