stages:
  train_mlp:
    desc: Orchestrate the MLP experiment from params.yaml
    cmd: uv run python src/object_classification.py --from-params
    deps:
      - src/
      - conf/
      - data/EEG-ImageNet.pth
    params:
      - dataset_dir
      - granularity
      - subject
      - batch_size
      - output_dir
      - pretrained_model
      - metric
      - model.name
      - model.type
      - model.feature_type
      - model.epochs
      - model.optimizer.type
      - model.optimizer.lr
      - model.optimizer.weight_decay
      - model.optimizer.momentum
    outs:
      - outputs/:
          cache: false
          persist: true
