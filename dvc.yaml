stages:
  train_object_classification:
    desc: Train the default EEG object-classification model through Hydra CLI overrides
    cmd: >-
      uv run python src/object_classification.py
      model=eegnet
      subject=0
      metric=wt
      output_dir=outputs/dvc
      hydra.run.dir=outputs/dvc/eegnet/wt/subject_0
    deps:
      - src/
      - configs/
    params:
      - configs/config.yaml:
          - batch_size
          - granularity
      - configs/model/eegnet.yaml:
          - epochs
          - optimizer.type
          - optimizer.lr
          - optimizer.weight_decay
          - optimizer.momentum
    outs:
      - outputs/dvc/eegnet/wt/subject_0
