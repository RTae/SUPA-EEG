stages:
  train_mlp:
    desc: Orchestrate the MLP experiment through Hydra
    cmd: uv run python src/object_classification.py
    deps:
      - src/
      - configs/
      - data/EEG-ImageNet.pth
    params:
      - configs/config.yaml:
          - batch_size
          - granularity
          - subject
          - metric
          - output_dir
      - configs/model/mlp.yaml:
          - model.feature_type
          - model.epochs
          - model.optimizer.type
          - model.optimizer.lr
          - model.optimizer.weight_decay
          - model.optimizer.momentum
    outs:
      - outputs/:
          cache: false
          persist: true
